name: Build & Release Applications

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace 2>&1
          echo "Gradle exit code: $?"

      - name: List all build outputs
        if: always()
        run: |
          echo "=== Searching entire android directory for APKs ==="
          find android/ -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null || echo "No APKs found"
          echo "=== android/app/build directory ==="
          ls -la android/app/build/ 2>/dev/null || echo "Build directory does not exist"

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-Mobile-APK
          path: android/**/*.apk
          if-no-files-found: error

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Download Windows Binaries (yt-dlp & FFmpeg)
        shell: powershell
        run: |
          echo "Downloading yt-dlp.exe..."
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"
          
          echo "Downloading FFmpeg..."
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"
          
          $ffmpegPath = Get-ChildItem -Path "ffmpeg_extracted" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          $ffprobePath = Get-ChildItem -Path "ffmpeg_extracted" -Filter "ffprobe.exe" -Recurse | Select-Object -First 1
          
          Copy-Item -Path $ffmpegPath.FullName -Destination ".\ffmpeg.exe"
          Copy-Item -Path $ffprobePath.FullName -Destination ".\ffprobe.exe"

      - name: Build Windows Executable
        run: |
          pyinstaller --noconfirm yd_app.spec

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-Windows-EXE
          path: dist/yd_app.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files/

      - name: Prepare Release Files
        run: |
          mkdir -p final-release/
          find release-files/ -type f -name "*.apk" -exec cp {} final-release/YTDownloader-Mobile.apk \;
          find release-files/ -type f -name "*.exe" -exec cp {} final-release/YTDownloader-Windows.exe \;
          ls -la final-release/

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release (Automated Build)
          draft: false
          prerelease: false
          files: |
            final-release/YTDownloader-Mobile.apk
            final-release/YTDownloader-Windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
